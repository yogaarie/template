apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-example-generator
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/yogaarie/template.git
      revision: HEAD
      files:
      - path: "argo/env-config/**/config.json"    
  template:
    metadata:
      name: '{{.appname}}'
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      sources:
        - repoURL: https://github.com/yogaarie/template.git
          path: template-helm
          targetRevision: HEAD
          helm:
            valueFiles:
              - '$values/chart-helm/{{.appname}}.yaml' # Parameterized file name
        - repoURL: 'https://github.com/yogaarie/template.git'
          targetRevision: HEAD
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true